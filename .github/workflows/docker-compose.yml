name: Validar contenedores

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  docker-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar y buscar Archivos
        run: |
          sudo apt-get install -y unzip
          unzip -o "*.zip" || echo "No hay zip extra"
          # Busca en qué carpeta está el archivo docker-compose.yml real de tu app
          COMPOSE_PATH=$(find . -name "docker-compose.yml" -not -path "*/.github/*" -print -quit | xargs dirname)
          if [ -z "$COMPOSE_PATH" ]; then COMPOSE_PATH="."; fi
          echo "REAL_WORKSPACE=$COMPOSE_PATH" >> $GITHUB_ENV
          echo "El docker-compose de la app está en: $COMPOSE_PATH"

      - name: Mostrar versiones
        run: |
          docker --version
          docker compose version

      - name: Crear archivo de entorno
        defaults:
          run:
            working-directory: ${{ env.REAL_WORKSPACE }}
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=root
          MYSQL_DATABASE=tienda
          MYSQL_USER=tienda
          MYSQL_PASSWORD=tienda
          DB_HOST=db
          DB_PORT=3306
          DB_NAME=tienda
          DB_USER=tienda
          DB_PASSWORD=tienda
          EOF

      - name: Construir y levantar contenedores
        defaults:
          run:
            working-directory: ${{ env.REAL_WORKSPACE }}
        run: docker compose up -d --build

      - name: Ver estado de contenedores
        defaults:
          run:
            working-directory: ${{ env.REAL_WORKSPACE }}
        run: docker compose ps

      - name: Esperar backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/ >/dev/null; then
              echo "Backend listo"
              exit 0
            fi
            echo "Esperando backend..."
            sleep 3
          done
          echo "Timeout esperando al backend"
          exit 1

      - name: Probar frontend
        run: curl -fsS http://localhost:8080/ >/dev/null

      - name: Mostrar logs si falla
        if: failure()
        defaults:
          run:
            working-directory: ${{ env.REAL_WORKSPACE }}
        run: docker compose logs

      - name: Apagar contenedores
        if: always()
        defaults:
          run:
            working-directory: ${{ env.REAL_WORKSPACE }}
        run: docker compose down -v
        
