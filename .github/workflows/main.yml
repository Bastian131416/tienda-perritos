name: Deploy Tienda Bastian

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Codigo Manualmente
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth 1 origin main
          git checkout main

      - name: Preparar Archivos de Bastian
        run: |
          sudo apt-get install -y unzip
          # Descomprimimos el ZIP
          unzip -o "2.2.3 APP tienda-perritos_LOCAL.zip"
          
          # Buscamos dónde quedó la carpeta backend y la movemos al frente
          BACKEND_PATH=$(find . -name "backend" -type d -not -path "*/.*" | head -n 1)
          echo "Carpeta backend encontrada en: $BACKEND_PATH"
          cp -r $BACKEND_PATH/. ./backend_final || mkdir ./backend_final

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # Ahora usamos la carpeta que preparamos con un punto (.) al final
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest ./backend_final
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: elservidor.redirectme.net
          username: user5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
            docker stop tienda-backend-u05 || true
            docker rm tienda-backend-u05 || true
            docker run -d --name tienda-backend-u05 -p 3005:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
