name: Deploy Tienda Bastian

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # En lugar de usar checkout@v4, bajamos el código manualmente
      - name: Descargar Codigo Manualmente
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth 1 origin main
          git checkout main

      - name: Preparar Archivos de Bastian
        run: |
          sudo apt-get install -y unzip
          # Descomprimimos el ZIP gigante
          unzip "2.2.3 APP tienda-perritos_LOCAL.zip"
          # Copiamos solo lo que hay en tu carpeta user5 a la raíz de trabajo
          cp -r user5/* . || true

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # Construimos el backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: elservidor.redirectme.net
          username: user5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
            docker stop tienda-backend-u05 || true
            docker rm tienda-backend-u05 || true
            docker run -d --name tienda-backend-u05 -p 3005:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
