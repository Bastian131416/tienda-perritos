name: Deploy Tienda Bastian

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Codigo
        uses: actions/checkout@v4

      - name: Preparar Archivos
        run: |
          sudo apt-get install -y unzip
          
          # Intentamos descomprimir cualquier zip que exista
          unzip -o "*.zip" || echo "No se encontró ningún archivo ZIP para descomprimir"
          
          # Buscamos el Dockerfile. Si no hay, usamos el directorio actual (.)
          # Esto evita el error de 'requires 1 argument'
          DOCKER_DIR=$(find . -name "Dockerfile" -printf '%h\n' -quit)
          
          if [ -z "$DOCKER_DIR" ]; then
            echo "No se encontro Dockerfile en subcarpetas, usando raiz"
            DOCKER_DIR="."
          fi
          
          echo "RUTA_FINAL=$DOCKER_DIR" >> $GITHUB_ENV
          echo "Ruta de construccion configurada en: $DOCKER_DIR"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # Usamos la variable que definimos arriba
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest ${{ env.RUTA_FINAL }}
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: elservidor.redirectme.net
          username: user5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
            docker stop tienda-backend-u05 || true
            docker rm tienda-backend-u05 || true
            docker run -d --name tienda-backend-u05 -p 3005:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
