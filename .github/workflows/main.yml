name: Deploy Tienda Bastian

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Codigo Manualmente
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth 1 origin main
          git checkout main

      - name: Preparar Archivos
        run: |
          sudo apt-get install -y unzip
          # Descomprimimos el ZIP ignorando errores
          unzip -o "2.2.3 APP tienda-perritos_LOCAL.zip" || true
          
          # Intentamos encontrar el Dockerfile. Donde esté el Dockerfile, ahí es.
          DOCKERFILE_DIR=$(find . -name "Dockerfile" -exec dirname {} \; | grep "backend" | head -n 1)
          
          if [ -z "$DOCKERFILE_DIR" ]; then
            echo "No pillamos carpeta backend, usando la raiz..."
            DOCKERFILE_DIR="."
          fi
          
          echo "Construyendo desde: $DOCKERFILE_DIR"
          # Guardamos la ruta en una variable de entorno de GitHub
          echo "FINAL_PATH=$DOCKERFILE_DIR" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # Usamos la ruta que encontramos antes
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest ${{ env.FINAL_PATH }}
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: elservidor.redirectme.net
          username: user5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
            docker stop tienda-backend-u05 || true
            docker rm tienda-backend-u05 || true
            docker run -d --name tienda-backend-u05 -p 3005:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
