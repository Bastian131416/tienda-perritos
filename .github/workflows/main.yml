name: Deploy Tienda Bastian

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Estas 3 líneas evitan el error 128 en repositorios pesados o compartidos
          fetch-depth: 1
          sparse-checkout: |
            2.2.3 APP tienda-perritos_LOCAL.zip
            user5
          sparse-checkout-cone-mode: false

      - name: Preparar Archivos de Bastian
        run: |
          # Instalamos unzip por si no está (aunque suele estar)
          sudo apt-get install -y unzip
          
          # Descomprimimos solo lo necesario
          unzip "2.2.3 APP tienda-perritos_LOCAL.zip"
          
          # Movemos tu contenido a la carpeta de trabajo
          cp -r user5/* . || true

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # Intentamos construir desde la carpeta backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: elservidor.redirectme.net
          username: user5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
            docker stop tienda-backend-u05 || true
            docker rm tienda-backend-u05 || true
            docker run -d --name tienda-backend-u05 -p 3005:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
