name: Deploy Tienda Bastian

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Codigo Manualmente
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth 1 origin main
          git checkout main

      - name: Preparar Archivos
        run: |
          sudo apt-get install -y unzip
          # Usamos comillas dobles y comodines para que encuentre el zip sí o sí
          unzip -o "*.zip"
          
          # Listamos todo para que en el log veamos qué hay (ayuda a depurar)
          ls -R
          
          # Buscamos el Dockerfile. Si no hay uno en backend, buscamos cualquiera.
          # Forzamos la ruta a "." si no encuentra nada para que docker build no falle por falta de argumento
          DOCKER_PATH=$(find . -name "Dockerfile" -print -quit | xargs dirname)
          if [ -z "$DOCKER_PATH" ]; then DOCKER_PATH="."; fi
          
          echo "Ruta final encontrada: $DOCKER_PATH"
          echo "FINAL_PATH=$DOCKER_PATH" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # El punto al final de ${{ env.FINAL_PATH }}/. asegura que siempre haya un argumento
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest ${{ env.FINAL_PATH }}/.
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: elservidor.redirectme.net
          username: user5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
            docker stop tienda-backend-u05 || true
            docker rm tienda-backend-u05 || true
            docker run -d --name tienda-backend-u05 -p 3005:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
