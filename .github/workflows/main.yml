name: Deploy Tienda Bastian

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descarga Manual con Permisos
        run: |
          git init
          # Usamos el token de GitHub para saltar el error 128 de permisos
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin main
          git checkout main

      - name: Preparar Archivos
        run: |
          sudo apt-get install -y unzip
          # Descomprimimos el ZIP si existe
          unzip -o "*.zip" || echo "No hay ZIP"
          
          # Buscamos el Dockerfile. Si no hay, usamos la raíz (.).
          DOCKER_PATH=$(find . -name "Dockerfile" -print -quit | xargs dirname)
          if [ -z "$DOCKER_PATH" ]; then DOCKER_PATH="."; fi
          
          echo "FINAL_PATH=$DOCKER_PATH" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # Construimos la imagen con la ruta encontrada
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest ${{ env.FINAL_PATH }}
          docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: elservidor.redirectme.net
          username: user5
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
            docker stop tienda-backend-u05 || true
            docker rm tienda-backend-u05 || true
            docker run -d --name tienda-backend-u05 -p 3005:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest
