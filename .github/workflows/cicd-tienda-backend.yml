    paths:
      - 'backend/**'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Simular Docker Build Backend
        run: |
          echo "Iniciando Docker Build para la capa Backend..."
          cd backend
          echo "Imagen de Backend construida con exito."

      - name: Simular Despliegue
        run: echo "Desplegando capa Backend..."
