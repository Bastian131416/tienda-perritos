version: "3.8"

services:
  frontend:
    build: ./frontend
    container_name: tienda-frontend-u07
    ports:
      - "8107:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: tienda-backend-u07
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_perritos
      DB_PORT: 3306
    ports:
      - "3007:3001"
    depends_on:
      - db

  db:
    build: ./db
    command: --innodb-use-native-aio=0
    container_name: tienda-db-u07
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
